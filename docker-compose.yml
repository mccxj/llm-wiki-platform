# LLM Wiki Platform - Docker Compose
version: '3.8'

services:
  mariadb:
    image: mariadb:11.8
    container_name: llmwiki-mariadb
    environment:
      MARIADB_DATABASE: llmwiki
      MARIADB_USER: llmwiki
      MARIADB_PASSWORD: llmwiki
      MARIADB_ROOT_PASSWORD: llmwiki
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-wiki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmwiki-app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_USERNAME: llmwiki
      DB_PASSWORD: llmwiki
      AI_API_BASE_URL: ${AI_API_BASE_URL:-http://host.docker.internal:8000/v1}
      AI_API_KEY: ${AI_API_KEY:-sk-local}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llmwiki-frontend
    depends_on:
      - llm-wiki
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  mariadb_data:

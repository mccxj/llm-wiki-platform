# LLM Wiki Platform - Docker Compose
version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: llmwiki-postgres
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: llmwiki
      POSTGRES_PASSWORD: llmwiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-wiki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmwiki-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USERNAME: llmwiki
      DB_PASSWORD: llmwiki
      AI_API_BASE_URL: ${AI_API_BASE_URL:-http://host.docker.internal:8000/v1}
      AI_API_KEY: ${AI_API_KEY:-sk-local}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llmwiki-frontend
    depends_on:
      - llm-wiki
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:

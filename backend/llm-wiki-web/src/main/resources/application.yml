spring:
  application:
    name: llm-wiki-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/llmwiki
    username: ${DB_USERNAME:llmwiki}
    password: ${DB_PASSWORD:llmwiki}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.llmwiki: DEBUG

ai:
  api:
    base-url: ${AI_API_BASE_URL:http://localhost:8000/v1}
    key: ${AI_API_KEY:sk-local}
  model: ${AI_MODEL:gpt-4o-mini}

embedding:
  model: ${EMBEDDING_MODEL:text-embedding-ada-002}
  dimension: 1536

